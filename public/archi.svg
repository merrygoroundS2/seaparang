<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Body (torso) - light blue-gray seal body -->
  <ellipse cx="100" cy="150" rx="55" ry="60" fill="#B8C8D8"/>
  <!-- Orange vest/jacket -->
  <path d="M55 140 Q60 110 80 105 L100 115 L120 105 Q140 110 145 140 Q130 160 100 165 Q70 160 55 140Z" fill="#E8650A"/>
  <!-- Coast Guard emblem on chest -->
  <circle cx="100" cy="135" r="10" fill="#D4A017"/>
  <text x="100" y="139" text-anchor="middle" font-size="8" fill="#2B4A8A" font-weight="bold">⚓</text>
  <!-- Head - large round blue-gray head -->
  <circle cx="100" cy="72" r="52" fill="#B8C8D8"/>
  <!-- Face - lighter area -->
  <ellipse cx="100" cy="80" rx="38" ry="38" fill="#D0DDE8"/>
  <!-- Eyes - large cute round eyes -->
  <ellipse cx="84" cy="68" rx="10" ry="11" fill="white"/>
  <ellipse cx="116" cy="68" rx="10" ry="11" fill="white"/>
  <circle cx="86" cy="70" r="6" fill="#2D2D2D"/>
  <circle cx="118" cy="70" r="6" fill="#2D2D2D"/>
  <circle cx="88" cy="67" r="2.5" fill="white"/>
  <circle cx="120" cy="67" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="85" rx="7" ry="5" fill="#8AAABB"/>
  <!-- Cheeks -->
  <circle cx="72" cy="84" r="9" fill="#FFB5C0" opacity="0.7"/>
  <circle cx="128" cy="84" r="9" fill="#FFB5C0" opacity="0.7"/>
  <!-- Mouth - cute smile -->
  <path d="M90 94 Q100 102 110 94" stroke="#5A7A8A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Left flipper/arm -->
  <ellipse cx="42" cy="145" rx="18" ry="26" fill="#A0B4C4" transform="rotate(-25 42 145)"/>
  <!-- Right flipper/arm raised -->
  <ellipse cx="158" cy="130" rx="16" ry="24" fill="#A0B4C4" transform="rotate(35 158 130)"/>
  <!-- Tail fins at bottom -->
  <ellipse cx="80" cy="205" rx="22" ry="10" fill="#A0B4C4" transform="rotate(-15 80 205)"/>
  <ellipse cx="120" cy="205" rx="22" ry="10" fill="#A0B4C4" transform="rotate(15 120 205)"/>
</svg>
